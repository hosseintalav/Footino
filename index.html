<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فوتینو</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        
        <div class="header-bg-blur"></div>

        <div class="header-left">
            <button class="icon-btn" id="contact-btn" aria-label="ارتباط با سازنده">
                <i class="fas fa-headset"></i>
            </button>
        </div>

        <div class="header-center">
            <img class="worldcup" src="assets/worldcup.png" alt="جام جهانی" class="trophy-icon" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/f/fd/2022_FIFA_World_Cup.svg/1200px-2022_FIFA_World_Cup.svg.png'">
            <h1 class="app-title">فـوتـینو</h1>
        </div>

        <div class="header-right">
            <button class="icon-btn" id="theme-toggle" aria-label="تغییر تم">
                <i class="fas fa-sun theme-icon"></i>
            </button>
        </div>
    </header>

    <div id="countdown-banner" class="countdown-sticky">
        <div class="countdown-inner">
            <div class="cd-flag-wrapper" id="cd-flag1-container">
                <div class="cd-flag-backdrop" id="cd-flag1-blur"></div>
                <img class="cd-flag-front" id="cd-flag1" src="" alt="">
            </div>

            <div class="countdown-center-content">
                <span id="countdown-title" class="countdown-title">شمارش معکوس بازی بعدی</span>
                <div class="countdown-timer">
                    <div class="time-segment"><span id="cd-days">00</span><small>روز</small></div>
                    <div class="time-divider">:</div>
                    <div class="time-segment"><span id="cd-hours">00</span><small>ساعت</small></div>
                    <div class="time-divider">:</div>
                    <div class="time-segment"><span id="cd-minutes">00</span><small>دقیقه</small></div>
                    <div class="time-divider">:</div>
                    <div class="time-segment"><span id="cd-seconds">00</span><small>ثانیه</small></div>
                </div>
            </div>

            <div class="cd-flag-wrapper" id="cd-flag2-container">
                <div class="cd-flag-backdrop" id="cd-flag2-blur"></div>
                <img class="cd-flag-front" id="cd-flag2" src="" alt="">
            </div>
        </div>
    </div>

    <main id="match-list" class="match-container">
        </main>

    <div id="contact-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>ارتباط با سازنده </h3>
            <p>برای ارتباط با سازنده روی دکمه‌های زیر بزنید.</p>
            <div class="modal-buttons">
                <a href="https://t.me/w8i_7" target="_blank" class="modal-btn telegram-btn">
                    <i class="fab fa-telegram-plane"></i> تلگرام: w8i_7
                </a>
                <a href="https://www.instagram.com/w8i_z" target="_blank" class="modal-btn instagram-btn">
                    <i class="fab fa-instagram"></i> اینستاگرام: w8i_z
                </a>
            </div>
            <button class="close-modal-btn" id="close-modal">بستن</button>
        </div>
    </div>

    <button id="scroll-top-btn" class="scroll-top-btn" aria-label="بازگشت به بالا">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
